<svg viewBox="0 0 320 72" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="SmartProDS Logo">
  <defs>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4B8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00A389;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="darkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1635;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#060F2A;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- ICON MARK: Hexagonal data node -->
  <!-- Outer hexagon -->
  <path d="M36 4 L62 19 L62 49 L36 64 L10 49 L10 19 Z" fill="url(#tealGrad)"/>
  <!-- Inner geometric: 3 nodes connected as data network -->
  <circle cx="36" cy="23" r="4" fill="#060F2A" opacity="0.9"/>
  <circle cx="22" cy="44" r="4" fill="#060F2A" opacity="0.9"/>
  <circle cx="50" cy="44" r="4" fill="#060F2A" opacity="0.9"/>
  <!-- Connection lines -->
  <line x1="36" y1="23" x2="22" y2="44" stroke="#060F2A" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="36" y1="23" x2="50" y2="44" stroke="#060F2A" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="22" y1="44" x2="50" y2="44" stroke="#060F2A" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Center dot accent -->
  <circle cx="36" cy="37" r="2.5" fill="#FFFFFF" opacity="0.6"/>

  <!-- WORDMARK -->
  <!-- "Smart" in Midnight Navy weight -->
  <text x="82" y="30" font-family="'Syne', 'Segoe UI', sans-serif" font-weight="700" font-size="22" fill="#060F2A" letter-spacing="-0.5">Smart</text>
  <!-- "Pro" in Teal -->
  <text x="163" y="30" font-family="'Syne', 'Segoe UI', sans-serif" font-weight="700" font-size="22" fill="#00BFA6" letter-spacing="-0.5">Pro</text>
  <!-- "DS" in Midnight Navy bold -->
  <text x="202" y="30" font-family="'Syne', 'Segoe UI', sans-serif" font-weight="800" font-size="22" fill="#060F2A" letter-spacing="-0.5">DS</text>

  <!-- Tagline -->
  <text x="82" y="50" font-family="'Plus Jakarta Sans', 'Segoe UI', sans-serif" font-weight="400" font-size="11" fill="#6B7A99" letter-spacing="2">DATA INTELLIGENCE. DELIVERED.</text>

  <!-- Divider line between icon and wordmark -->
  <line x1="74" y1="16" x2="74" y2="56" stroke="#E2E8F0" stroke-width="1"/>
</svg>
