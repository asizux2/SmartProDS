<!DOCTYPE html>
<html>
<head>
    <title>ValU Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: #0A0A0A; color: #F5F5F5; }
        header { background: #111; padding: 20px 40px; border-bottom: 1px solid #1E1E1E; display: flex; justify-content: space-between; align-items: center; }
        h1 { color: #1E88E5; margin: 0; font-size: 24px; }
        .nav { display: flex; gap: 10px; background: #111; padding: 10px 40px; border-bottom: 1px solid #1E1E1E; }
        .tab { padding: 8px 16px; cursor: pointer; border-radius: 4px; color: #6B6B6B; transition: 0.3s; border: none; background: transparent; font-size: 14px; }
        .tab.active { background: #1E88E5; color: white; }
        .content { padding: 40px; display: none; }
        .content.active { display: block; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .card { background: #111; padding: 24px; border-radius: 12px; border: 1px solid #1E1E1E; transition: 0.3s; }
        .card:hover { border-color: #1E88E5; }
        .label { color: #6B6B6B; font-size: 14px; margin-bottom: 8px; }
        .metric { font-size: 32px; font-weight: bold; color: #22C55E; margin-bottom: 4px; }
        .sub { color: #6B6B6B; font-size: 12px; }
    </style>
</head>
<body>
    <header>
        <h1>ValU Dashboard</h1>
        <div style="font-size: 12px; color: #6B6B6B;">Last Sync: 2026-04-20 20:55</div>
    </header>
    <div class="nav">
        <button class="tab active" onclick="openTab(event, 'overview')">Overview</button>
        <button class="tab" onclick="openTab(event, 'network')">Network</button>
    </div>
    <div id="overview" class="content active">
        <div class="grid"><div class="card"><div class="label">Active Users</div><div class="metric">2.5M+</div><div class="sub">42% share | +30% YoY</div></div><div class="card"><div class="label">GMV</div><div class="metric">EGP 12B</div><div class="sub">n/a share | +25% YoY</div></div><div class="card"><div class="label">Avg Loan</div><div class="metric">EGP 4200</div><div class="sub">n/a share | +10% YoY</div></div><div class="card"><div class="label">B2B Loan</div><div class="metric">EGP 50000</div><div class="sub">n/a share | Target</div></div><div class="card"><div class="label">SME Default</div><div class="metric">5.5%</div><div class="sub">n/a share | Est</div></div></div>
    </div>
    <div id="network" class="content">
        <div class="grid"></div>
    </div>
    <script>
        function openTab(evt, tabName) {
            var i, content, tabs;
            content = document.getElementsByClassName("content");
            for (i = 0; i < content.length; i++) content[i].className = content[i].className.replace(" active", "");
            tabs = document.getElementsByClassName("tab");
            for (i = 0; i < tabs.length; i++) tabs[i].className = tabs[i].className.replace(" active", "");
            document.getElementById(tabName).className += " active";
            evt.currentTarget.className += " active";
        }
    </script>
</body>
</html>
